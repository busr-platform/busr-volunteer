<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بُصر الفرص التطوعية</title>

<style>
body{
font-family: Arial, sans-serif;
background:#eef8fb;
text-align:center;
padding:30px;
color:#173b36;
}

.card{
background:#fff;
padding:24px;
border-radius:22px;
max-width:430px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
margin-bottom:25px;
}

input,textarea,select{
width:100%;
margin:8px 0;
padding:12px;
border-radius:12px;
border:1px solid #b8dde3;
font-size:15px;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

textarea{
min-height:90px;
}

button{
padding:12px 24px;
border:none;
border-radius:12px;
background:#78c2cf;
color:#fff;
cursor:pointer;
font-size:15px;
margin-top:10px;
}

button:hover{
background:#63b2c0;
}

.hidden{
display:none;
}

.msg{
margin-top:12px;
font-weight:bold;
color:#45635d;
}
</style>
</head>

<body>

<h1>بُصر الفرص التطوعية</h1>

<div class="card" id="loginBox">
<h3>تسجيل الدخول</h3>

<input id="email" type="email" placeholder="البريد الإلكتروني">
<input id="pass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg" class="msg"></p>
</div>

<div class="card hidden" id="formBox">
<h3>إدخال فرصة تطوعية</h3>

<input id="title" placeholder="مسمى الفرصة">

<textarea id="desc" placeholder="وصف الفرصة"></textarea>

<select id="field">
<option value="">اختر مجال التطوع</option>
<option>صحي</option>
<option>بيئي</option>
<option>قانوني</option>
<option>تعليمي</option>
<option>ديني</option>
<option>اجتماعي وإنساني</option>
<option>ثقافي</option>
<option>فني وإبداعي</option>
<option>إعلامي</option>
<option>رياضي</option>
<option>سياحي</option>
<option>ترفيهي</option>
<option>تقنية المعلومات</option>
<option>إداري</option>
<option>الأمن والسلامة</option>
<option>هندسي</option>
<option>البحث العلمي والابتكار</option>
</select>

<input id="vol" type="number" placeholder="عدد المتطوعين">
<input id="hours" type="number" placeholder="إجمالي الساعات">
<input id="manager" placeholder="اسم المدير">

<button onclick="send()">إرسال الفرصة</button>

<p id="msg2" class="msg"></p>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbwB4_j-UOn4IGWlqsIiQQK69g4pJ3lTaflV32NMV0-sNaqYctRsT0KxRcLyJtsd84K49Q/exec";

let user = {};

function login(){
const emailValue = document.getElementById("email").value.trim();
const passValue = document.getElementById("pass").value.trim();

if(!emailValue || !passValue){
msg.innerText = "أدخلي البريد وكلمة المرور";
return;
}

msg.innerText = "جارٍ التحقق...";

fetch(`${url}?action=login&email=${encodeURIComponent(emailValue)}&pass=${encodeURIComponent(passValue)}`)
.then(r => r.json())
.then(d => {
if(d.status === "ok"){
user = d;
loginBox.classList.add("hidden");
formBox.classList.remove("hidden");
msg.innerText = "";
}else if(d.status === "inactive"){
msg.innerText = "الحساب غير نشط";
}else if(d.status === "wrong_pass"){
msg.innerText = "كلمة المرور غير صحيحة";
}else if(d.status === "not_found"){
msg.innerText = "البريد غير مسجل";
}else{
msg.innerText = "تعذر الدخول";
}
})
.catch(() => {
msg.innerText = "تعذر الاتصال بالرابط";
});
}

function send(){
if(!title.value.trim() || !desc.value.trim() || !field.value.trim() || !vol.value.trim() || !hours.value.trim() || !manager.value.trim()){
msg2.innerText = "أكملي جميع الحقول";
return;
}

msg2.innerText = "جارٍ الإرسال...";

fetch(url,{
method:"POST",
body:JSON.stringify({
action:"createOpportunity",
email:user.email,
pass:pass.value,
role:user.role,
title:title.value,
description:desc.value,
field:field.value,
volunteers:vol.value,
hours:hours.value,
manager:manager.value
})
})
.then(r => r.json())
.then(d => {
if(d.status === "ok"){
msg2.innerText = "تم إرسال الفرصة بنجاح ✔";
title.value = "";
desc.value = "";
field.value = "";
vol.value = "";
hours.value = "";
manager.value = "";
}else{
msg2.innerText = "تعذر الإرسال: " + d.status;
}
})
.catch(() => {
msg2.innerText = "تعذر الاتصال أثناء الإرسال";
});
}
</script>

</body>
</html>
