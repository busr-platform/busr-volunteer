<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بُصر | تسجيل الدخول</title>

<style>
body {
margin: 0;
font-family: "Tahoma", sans-serif;
background: #f5f7f6;
}

/* الحاوية */
.container {
max-width: 600px;
margin: 60px auto;
padding: 20px;
}

/* الهيدر */
.header {
background: linear-gradient(135deg,#cde7e3,#b7d8d3);
padding: 25px;
border-radius: 20px;
margin-bottom: 25px;
}

.header h1 {
margin: 0;
font-size: 26px;
}

.header p {
margin-top: 8px;
color: #2f4f4f;
}

/* بطاقة الدخول */
.card {
background: white;
padding: 25px;
border-radius: 20px;
box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* عنوان */
.title {
font-size: 22px;
margin-bottom: 20px;
}

/* صف الإدخال */
.input-row {
display: flex;
align-items: center;
border: 2px solid #d8e6e3;
border-radius: 14px;
padding: 10px 15px;
background: #fff;
}

/* الإيميل */
.input-row input {
border: none;
outline: none;
font-size: 16px;
width: 100%;
direction: ltr;
}

/* الأيقونة */
.icon {
font-size: 18px;
margin-right: 10px;
}

/* زر الدخول */
.btn {
margin-top: 15px;
background: #4fa7a1;
color: white;
border: none;
padding: 10px 25px;
border-radius: 12px;
cursor: pointer;
}

/* رسالة الخطأ */
.error {
margin-top: 15px;
background: #fdeeee;
color: #7a2f2f;
padding: 12px;
border-radius: 12px;
text-align: center;
font-size: 15px;
}

/* الفوتر */
.footer {
margin-top: 20px;
text-align: center;
color: #666;
font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>بُصر الفرص التطوعية</h1>
<p>ثقة فرصة في كل حين سعيٌ نبيل وبإجراءٍ يسير</p>
</div>

<div class="card">
<div class="title">بوابة الدخول</div>

<!-- الإيميل -->
<div class="input-row">
<input id="email" type="text" value="busr2026@gmail.com">
<div class="icon">👤</div>
</div>

<button class="btn" onclick="login()">دخول</button>

<!-- رسالة الخطأ -->
<div id="errorMsg" class="error" style="display:none;">
لا توجد صلاحية محددة لهذا البريد.
</div>

</div>

<div class="footer">
busr2026@gmail.com | تطوير بُصر
</div>

</div>

<script>
function login() {
const email = document.getElementById("email").value;

// مؤقتًا (إلى أن نربط الشيت)
if(email === "busr2026@gmail.com"){
alert("تم الدخول كمسؤولة النظام 👑");
} else {
document.getElementById("errorMsg").style.display = "block";
}
}
</script>

</body>
</html>
