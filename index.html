<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بُصر | تسجيل الدخول</title>

<style>
body {
    font-family: Tahoma;
    background: #f5f7f6;
    margin: 0;
    padding: 30px;
}

.card {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.title {
    font-size: 20px;
    margin-bottom: 15px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    background: #0b8f87;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 5px;
}

.btn:hover {
    background: #09706a;
}

.error {
    display: none;
    background: #ffe5e5;
    color: #a30000;
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #777;
}
</style>

</head>

<body>

<div class="card">

    <div class="title">بوابة الدخول</div>

    <input id="email" type="email" placeholder="البريد الإلكتروني">

    <button class="btn" onclick="login()">دخول</button>

    <div id="errorMsg" class="error">
        لا توجد صلاحية محددة لهذا البريد.
    </div>

</div>

<div class="footer">
    busr2026@gmail.com | تطوير بُصر
</div>

<script>

function login() {
    const email = document.getElementById("email").value.trim().toLowerCase();

    if (email === "busr2026@gmail.com") {

        document.querySelector(".card").innerHTML = `
        <div class="title">تم الدخول كمسؤولة النظام 👑</div>

        <div style="background:#eef6f5;border-radius:16px;padding:16px;line-height:2;margin-bottom:15px;">
        <b>البريد:</b> busr2026@gmail.com<br>
        <b>الدور:</b> مسؤولة النظام<br>
        <b>الصلاحية:</b> كامل الصلاحيات
        </div>

        <button class="btn" onclick="showOpportunityForm()">إدخال فرصة تطوعية</button>
        <button class="btn" onclick="showAdminPanel()">متابعة واعتماد الفرص</button>

        <div id="workArea" style="margin-top:20px;"></div>
        `;

    } else {
        document.getElementById("errorMsg").style.display = "block";
    }
}

function showOpportunityForm() {
    document.getElementById("workArea").innerHTML = `
        <h3>إدخال فرصة تطوعية</h3>
        <input type="text" placeholder="اسم الفرصة">
        <input type="number" placeholder="عدد المتطوعين">
        <button class="btn">إرسال</button>
    `;
}

function showAdminPanel() {
    document.getElementById("workArea").innerHTML = `
        <h3>لوحة مسؤولة النظام</h3>
        <p>هنا ستظهر الفرص للاعتماد والمتابعة.</p>
    `;
}

</script>

</body>
</html>
