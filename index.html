<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بُصر | إنشاء فرصة تطوعية</title>

<style>
body{
font-family: Arial;
background:#f4f8fa;
margin:0;
}

.container{
width:90%;
max-width:900px;
margin:30px auto;
}

.card{
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:20px;
}

.step{
display:none;
}

.active{
display:block;
}

input,textarea,select{
width:100%;
margin:10px 0;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#4db3c7;
color:#fff;
cursor:pointer;
}

button:hover{
background:#3aa0b5;
}

.nav{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.progress{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.progress div{
width:18%;
text-align:center;
padding:8px;
border-radius:10px;
background:#ddd;
}

.progress .done{
background:#4db3c7;
color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>إنشاء فرصة تطوعية</h1>

<div class="progress">
<div id="p1" class="done">1</div>
<div id="p2">2</div>
<div id="p3">3</div>
<div id="p4">4</div>
<div id="p5">5</div>
</div>

<div class="card">

<!-- خطوة 1 -->
<div class="step active" id="step1">
<h3>تفاصيل الفرصة</h3>

<input id="title" placeholder="مسمى الفرصة">
<textarea id="desc" placeholder="وصف الفرصة"></textarea>

<select id="field">
<option>اختر مجال التطوع</option>
<option>تعليمي</option>
<option>صحي</option>
<option>بيئي</option>
<option>إعلامي</option>
<option>تقني</option>
<option>اجتماعي</option>
</select>

<input id="manager" placeholder="اسم المدير">
</div>

<!-- خطوة 2 -->
<div class="step" id="step2">
<h3>خصائص الفرصة</h3>

<select id="level">
<option>مستوى التطوع</option>
<option>عام</option>
<option>مهاري</option>
<option>احترافي</option>
</select>

<select id="type">
<option>نوع المشاركة</option>
<option>فردي</option>
<option>جماعي</option>
</select>

<select id="remote">
<option>هل عن بعد؟</option>
<option>نعم</option>
<option>لا</option>
</select>
</div>

<!-- خطوة 3 -->
<div class="step" id="step3">
<h3>تفاصيل المتطوعين</h3>

<input id="vol" type="number" placeholder="عدد المتطوعين">

<select id="age">
<option>الفئة العمرية</option>
<option>18-25</option>
<option>26-35</option>
<option>جميع الأعمار</option>
</select>

<select id="gender">
<option>الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
<option>كلاهما</option>
</select>
</div>

<!-- خطوة 4 -->
<div class="step" id="step4">
<h3>الفترات</h3>

<input id="date" type="date">
<input id="timeStart" type="time">
<input id="timeEnd" type="time">
<input id="hours" type="number" placeholder="إجمالي الساعات">
</div>

<!-- خطوة 5 -->
<div class="step" id="step5">
<h3>المراجعة</h3>

<p>تأكد من البيانات ثم اضغط إرسال</p>

<button onclick="send()">إرسال الفرصة</button>

<p id="msg"></p>
</div>

<div class="nav">
<button onclick="prev()">السابق</button>
<button onclick="next()">التالي</button>
</div>

</div>

</div>

<script>
let step = 1;

// 🔴 ضع رابط Apps Script هنا
const url = "PUT_YOUR_SCRIPT_URL_HERE";

function show(){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+step).classList.add("active");

document.querySelectorAll(".progress div").forEach(p=>p.classList.remove("done"));
for(let i=1;i<=step;i++){
document.getElementById("p"+i).classList.add("done");
}
}

function next(){
if(step<5){step++; show();}
}

function prev(){
if(step>1){step--; show();}
}

function send(){
fetch(url,{
method:"POST",
body:JSON.stringify({
action:"createOpportunity",
title:title.value,
description:desc.value,
field:field.value,
manager:manager.value,
volunteers:vol.value,
hours:hours.value
})
});

msg.innerText = "تم إرسال الفرصة ✔";
}
</script>

</body>
</html>
