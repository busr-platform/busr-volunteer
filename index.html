<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بُصر الفرص التطوعية</title>

<style>
body{
font-family: Arial;
background:#eef8fb;
text-align:center;
padding:30px;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
max-width:400px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
margin:8px 0;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#78c2cf;
color:#fff;
cursor:pointer;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="card" id="loginBox">
<h3>تسجيل الدخول</h3>

<input id="email" placeholder="البريد">
<input id="pass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg"></p>
</div>

<div class="card hidden" id="formBox">
<h3>إدخال فرصة تطوعية</h3>

<input id="title" placeholder="مسمى الفرصة">
<textarea id="desc" placeholder="وصف الفرصة"></textarea>
<input id="vol" type="number" placeholder="عدد المتطوعين">

<button onclick="send()">إرسال</button>

<p id="msg2"></p>
</div>

<script>

// 🔴 مهم جدًا: ضعي هنا رابط Apps Script (/exec)
const url = "PUT_YOUR_SCRIPT_URL_HERE";

let user = {};

function login(){
fetch(`${url}?action=login&email=${email.value}&pass=${pass.value}`)
.then(r=>r.json())
.then(d=>{
if(d.status==="ok"){
user = d;
loginBox.classList.add("hidden");
formBox.classList.remove("hidden");
}else{
msg.innerText = "فشل الدخول";
}
});
}

function send(){
fetch(url,{
method:"POST",
body:JSON.stringify({
action:"createOpportunity",
email:user.email,
pass:pass.value,
role:user.role,
title:title.value,
description:desc.value,
volunteers:vol.value
})
});

msg2.innerText = "تم الإرسال ✔";
}

</script>

</body>
</html>
